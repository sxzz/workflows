name: Sync Branches

on:
  push:
    branches: [main]

concurrency:
  group: sync-branches
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: true

      - name: Force push main to v1 and v2
        run: |
          git push origin HEAD:refs/heads/v1 --force
          git push origin HEAD:refs/heads/v2 --force
